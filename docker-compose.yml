version: '3.8'

services:
  backend:
    build: ./backend_ai
    volumes:
      - ./backend_ai:/app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
